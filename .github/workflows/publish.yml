name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    # No `environment:` block on purpose. With an environment declared,
    # pypa/gh-action-pypi-publish tries trusted publishing via OIDC first
    # and fails unless the publisher is configured on PyPI. Using the
    # repo-level PYPI_API_TOKEN keeps publishing working without
    # PyPI-side setup. To switch to trusted publishing: (1) configure
    # the publisher at https://pypi.org/manage/account/publishing/,
    # (2) restore the `environment:` block and `permissions: id-token: write`,
    # (3) drop the `password:` input.

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
